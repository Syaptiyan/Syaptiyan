name: Auto Contribution

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  contribute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update contribution
        run: |
          date >> CONTRIBUTIONS.md
          echo "Keep going! 💪" >> CONTRIBUTIONS.md

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || git commit -m "chore: update contribution $(date +%Y-%m-%d)"
          git push
